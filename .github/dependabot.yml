version: 2
updates:
  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    groups:
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
      prod-deps:
        dependency-type: production
      dev-deps:
        dependency-type: development
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "placy2"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      actions-all:
        patterns: ["*"]
    open-pull-requests-limit: 5
    reviewers:
      - "placy2"
    commit-message:
      prefix: "chore(actions):"
      include: "scope"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "placy2"
    commit-message:
      prefix: "chore(terraform):"
      include: "scope"
      
